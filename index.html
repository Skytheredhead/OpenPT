<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenPT</title>
<base href="/" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: oklch(0.16 0.005 240);
    --bg-1: oklch(0.19 0.006 240);
    --bg-2: oklch(0.23 0.007 240);
    --bg-3: oklch(0.27 0.008 240);
    --bg-hi: oklch(0.32 0.010 240);
    --line: oklch(0.32 0.010 240 / 0.7);
    --line-soft: oklch(0.32 0.010 240 / 0.3);
    --fg-0: oklch(0.96 0.003 240);
    --fg-1: oklch(0.78 0.005 240);
    --fg-2: oklch(0.60 0.006 240);
    --fg-3: oklch(0.45 0.007 240);
    --accent: oklch(0.78 0.13 220);
    --accent-dim: oklch(0.48 0.11 220);
    --accent-soft: oklch(0.78 0.13 220 / 0.14);
    --ok: oklch(0.78 0.15 150);
    --warn: oklch(0.84 0.14 90);
    --err: oklch(0.70 0.19 25);
    --magenta: oklch(0.72 0.17 330);
    --violet: oklch(0.72 0.15 290);
    --grid: oklch(0.28 0.010 240 / 0.45);
    --grid-dot: oklch(0.42 0.012 240 / 0.45);
    --font-ui: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg-0); color: var(--fg-0); font-family: var(--font-ui); -webkit-font-smoothing: antialiased; overflow: hidden; }
  body { font-size: 13px; letter-spacing: -0.005em; }
  button { font-family: inherit; color: inherit; }
  ::selection { background: var(--accent-soft); }

  /* ── App shell ───────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-rows: 38px 1fr;
    height: 100vh;
    width: 100vw;
  }
  .titlebar {
    display: flex; align-items: center;
    background: var(--bg-1);
    border-bottom: 1px solid var(--line);
    padding: 0 12px;
    gap: 16px;
    user-select: none;
  }
  .tb-logo {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; letter-spacing: -0.01em;
  }
  .tb-logo .glyph {
    width: 18px; height: 18px; position: relative;
    background:
      radial-gradient(circle at 50% 50%, var(--accent) 0 2.2px, transparent 2.5px),
      radial-gradient(circle at 15% 20%, var(--fg-1) 0 1.2px, transparent 1.5px),
      radial-gradient(circle at 85% 20%, var(--fg-1) 0 1.2px, transparent 1.5px),
      radial-gradient(circle at 15% 80%, var(--fg-1) 0 1.2px, transparent 1.5px),
      radial-gradient(circle at 85% 80%, var(--fg-1) 0 1.2px, transparent 1.5px);
    opacity: 0.85;
  }
  .tb-logo .glyph::before, .tb-logo .glyph::after {
    content: none;
  }
  .tb-menus { display: flex; gap: 2px; position: relative; }
  .tb-menu {
    padding: 4px 8px; border-radius: 5px;
    color: var(--fg-1); font-size: 12.5px;
    cursor: default;
    user-select: none;
  }
  .tb-menu:hover, .tb-menu.open { background: var(--bg-2); color: var(--fg-0); }
  .tb-menu.open { background: var(--bg-3); }
  .tb-dropdown {
    position: absolute; top: 100%; left: 0;
    min-width: 240px;
    background: color-mix(in oklab, var(--bg-1) 96%, transparent);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 14px 36px rgba(0,0,0,0.55);
    backdrop-filter: blur(10px);
    padding: 5px;
    z-index: 150;
    font-size: 12.5px;
  }
  .tb-dropdown-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px;
    border-radius: 5px;
    cursor: default;
    color: var(--fg-1);
  }
  .tb-dropdown-item:hover { background: var(--accent-soft); color: var(--fg-0); }
  .tb-dropdown-item .kbd {
    margin-left: auto;
    font-family: var(--font-mono); font-size: 10px;
    background: var(--bg-2); padding: 1px 5px; border-radius: 3px;
    color: var(--fg-3); border: 1px solid var(--line);
  }
  .tb-dropdown-sep {
    height: 1px; margin: 4px 4px;
    background: var(--line-soft);
  }
  .tb-dropdown-section {
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--fg-3); padding: 5px 10px 3px;
  }
  .tb-center {
    flex: 1; display: flex; justify-content: center; align-items: center;
  }
  .tb-status-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 10px 3px 8px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 12px; color: var(--fg-1);
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  .tb-status-chip .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ok); box-shadow: 0 0 8px var(--ok);
  }
  .tb-status-chip.sim .dot { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: pulse 1.4s infinite; }
  .tb-status-chip.dirty .dot, .tb-status-chip.saving .dot { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .tb-status-chip.err .dot, .tb-status-chip.conflict .dot { background: var(--err); box-shadow: 0 0 8px var(--err); }
  .tb-status-chip.offline .dot, .tb-status-chip.readonly .dot { background: var(--fg-3); box-shadow: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .tb-actions { display: flex; gap: 6px; }
  .tb-btn {
    appearance: none; border: 1px solid var(--line); background: var(--bg-2);
    color: var(--fg-1); padding: 4px 9px; border-radius: 6px;
    font-size: 12px; cursor: default; display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .tb-btn:hover { background: var(--bg-3); color: var(--fg-0); }
  .tb-btn.primary { background: var(--accent-soft); border-color: var(--accent-dim); color: var(--accent); }
  .tb-btn.primary:hover { background: color-mix(in oklab, var(--accent) 22%, transparent); }
  .tb-btn .kbd {
    font-family: var(--font-mono); font-size: 10.5px;
    background: var(--bg-1); padding: 1px 4px; border-radius: 3px;
    color: var(--fg-2); border: 1px solid var(--line);
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 260;
    display: flex;
    align-items: center;
    justify-content: center;
    background: color-mix(in oklab, var(--bg-0) 72%, transparent);
  }
  .modal {
    width: min(520px, calc(100vw - 32px));
    max-height: calc(100vh - 48px);
    overflow: hidden;
    display: grid;
    grid-template-rows: 42px 1fr;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
  }
  .modal-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 12px 0 16px;
    border-bottom: 1px solid var(--line);
  }
  .modal-title {
    flex: 1;
    font-weight: 600;
  }
  .modal-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: auto;
  }
  .modal-body label {
    display: grid;
    gap: 6px;
    color: var(--fg-2);
    font-size: 12px;
  }
  .hp-field {
    position: absolute;
    left: -10000px;
    width: 1px;
    height: 1px;
    overflow: hidden;
  }
  .modal-body input {
    background: var(--bg-0);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--fg-0);
    padding: 8px 10px;
    font: inherit;
  }
  .icon-btn {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--fg-2);
    font-size: 18px;
    width: 26px;
    height: 26px;
    border-radius: 5px;
  }
  .icon-btn:hover { background: var(--bg-2); color: var(--fg-0); }
  .segmented {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--bg-0);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 3px;
  }
  .segmented button {
    border: 0;
    background: transparent;
    color: var(--fg-2);
    border-radius: 4px;
    padding: 7px;
  }
  .segmented button.active {
    background: var(--bg-2);
    color: var(--fg-0);
  }
  .modal-error {
    border: 1px solid color-mix(in oklab, var(--err) 45%, var(--line));
    background: color-mix(in oklab, var(--err) 12%, transparent);
    color: var(--err);
    border-radius: 6px;
    padding: 9px 10px;
    font-size: 12px;
  }
  .account-row, .modal-actions, .rollback-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .account-row span { flex: 1; color: var(--fg-1); }
  .sync-line {
    font-family: var(--font-mono);
    color: var(--fg-2);
    font-size: 11px;
  }
  .project-list {
    display: grid;
    gap: 6px;
  }
  .project-row {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--fg-1);
    border-radius: 6px;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    text-align: left;
  }
  .project-row:hover { background: var(--bg-3); color: var(--fg-0); }
  .project-row small { color: var(--fg-3); font-family: var(--font-mono); }
  .empty-row {
    color: var(--fg-3);
    padding: 12px;
    text-align: center;
  }
  .modal-sep {
    height: 1px;
    background: var(--line);
  }

  /* ── Workspace ─────────────────────────────────────────── */
  /* ── Workspace ─────────────────────────────────────────── */
  .workspace {
    display: flex;
    min-height: 0;
  }
  .center-col {
    flex: 1;
    min-width: 0;
    display: grid;
    grid-template-rows: 32px minmax(0, 1fr) var(--bottom-panel-height, 280px);
    background: var(--bg-0);
    transition: grid-template-rows 180ms cubic-bezier(0.32, 0.72, 0.32, 1);
  }
  body.is-resizing-layout .center-col { transition: none; }
  .inspector-wrap {
    width: 300px;
    transition: width 240ms cubic-bezier(0.32, 0.72, 0.32, 1);
    overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .inspector-wrap.collapsed { width: 0; }
  .inspector {
    width: 300px; min-width: 300px;
    background: var(--bg-1);
    border-left: 1px solid var(--line);
    display: flex; flex-direction: column;
    min-height: 0;
    flex: 1;
  }
  .activity-bar {
    background: var(--bg-1);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 0; gap: 4px;
  }
  .activity-btn {
    width: 38px; height: 38px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-2); cursor: default; position: relative;
  }
  .activity-btn:hover { color: var(--fg-0); background: var(--bg-2); }
  .activity-btn.active { color: var(--accent); }
  .activity-btn.active::before {
    content: ""; position: absolute; left: -10px; top: 6px; bottom: 6px;
    width: 2px; background: var(--accent); border-radius: 2px;
  }
  .activity-spacer { flex: 1; }

  .side-panel {
    width: var(--side-panel-width, 380px);
    flex: 0 0 var(--side-panel-width, 380px);
    background: var(--bg-1);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .side-head {
    padding: 10px 12px 6px;
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--fg-3); font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .side-tabs {
    display: flex;
    border-bottom: 1px solid var(--line);
    background: var(--bg-1);
    padding: 0 4px;
  }
  .side-tab {
    appearance: none;
    border: 0;
    background: transparent;
    padding: 9px 10px;
    font-size: 11.5px; color: var(--fg-2);
    cursor: default;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-weight: 500;
  }
  .side-tab:hover { color: var(--fg-0); }
  .side-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .side-resizer {
    flex: 0 0 8px;
    margin-left: -4px;
    margin-right: -4px;
    cursor: ew-resize;
    z-index: 20;
    position: relative;
  }
  .side-resizer::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0; left: 3px;
    width: 2px;
    background: transparent;
  }
  .side-resizer:hover::before,
  body.is-resizing-layout .side-resizer::before {
    background: var(--fg-2);
  }
  body.is-resizing-layout {
    cursor: grabbing;
    user-select: none;
  }

  .pt-side-panel {
    color: var(--fg-1);
  }
  .pt-side-title {
    min-height: 62px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .pt-side-title > div {
    min-width: 0;
    flex: 1;
  }
  .pt-side-kicker {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--fg-3);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .pt-side-name {
    color: var(--fg-0);
    font-size: 13px;
    font-weight: 650;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pt-score-chip {
    flex: 0 0 auto;
    border: 1px solid var(--accent-dim);
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 6px;
    padding: 4px 7px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 650;
  }
  .pt-side-tabs {
    padding: 0 8px;
  }
  .pt-side-tabs .side-tab {
    flex: 1;
    text-align: center;
  }
  .pt-side-body {
    min-height: 0;
    flex: 1;
    overflow: auto;
    padding: 14px 16px 18px;
  }
  .pt-instructions-html {
    color: var(--fg-1);
    font-size: 12.5px;
    line-height: 1.5;
  }
  .pt-instructions-html h1,
  .pt-instructions-html h2,
  .pt-instructions-html h3,
  .pt-instructions-html h4,
  .pt-instructions-html h5,
  .pt-instructions-html h6 {
    color: var(--fg-0);
    margin: 14px 0 8px;
    line-height: 1.25;
    font-weight: 700;
  }
  .pt-instructions-html h1 { font-size: 17px; }
  .pt-instructions-html h2 { font-size: 15px; }
  .pt-instructions-html h3,
  .pt-instructions-html h4,
  .pt-instructions-html h5,
  .pt-instructions-html h6 { font-size: 13.5px; }
  .pt-instructions-html p,
  .pt-instructions-html ul,
  .pt-instructions-html ol {
    margin: 0 0 10px;
  }
  .pt-instructions-html ul,
  .pt-instructions-html ol {
    padding-left: 20px;
  }
  .pt-instructions-html strong,
  .pt-instructions-html b {
    color: var(--fg-0);
    font-weight: 700;
  }
  .pt-instructions-html em,
  .pt-instructions-html i {
    color: var(--fg-1);
  }
  .pt-instructions-html a {
    color: var(--accent);
  }
  .pt-instructions-html table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0 14px;
    color: var(--fg-1);
    background: var(--bg-0);
    border: 1px solid var(--line);
    font-size: 11.5px;
  }
  .pt-instructions-html th,
  .pt-instructions-html td {
    border: 1px solid var(--line-soft);
    padding: 7px 9px;
    text-align: left;
    vertical-align: top;
  }
  .pt-instructions-html th {
    background: var(--bg-2);
    color: var(--fg-0);
    font-weight: 700;
  }
  .pt-instructions-html td {
    background: color-mix(in oklab, var(--bg-1) 78%, var(--bg-0));
  }
  .pt-instructions-html tr:nth-child(even) td {
    background: var(--bg-1);
  }
  .pt-instructions-html code,
  .pt-instructions-html pre {
    color: var(--fg-0);
    background: var(--bg-0);
    border: 1px solid var(--line-soft);
    border-radius: 5px;
    font-family: var(--font-mono);
  }
  .pt-instructions-html code {
    padding: 1px 4px;
  }
  .pt-instructions-html pre {
    padding: 9px 10px;
    overflow: auto;
  }
  .pt-empty {
    color: var(--fg-2);
    padding: 18px 4px;
    line-height: 1.5;
  }
  .pt-progress {
    display: grid;
    gap: 14px;
  }
  .pt-metric-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }
  .pt-metric {
    border: 1px solid var(--line);
    background: var(--bg-0);
    border-radius: 6px;
    padding: 10px;
    min-width: 0;
  }
  .pt-metric span {
    display: block;
    color: var(--fg-3);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .pt-metric strong {
    display: block;
    color: var(--fg-0);
    font-family: var(--font-mono);
    font-size: 12px;
    overflow-wrap: anywhere;
  }
  .pt-section-title {
    color: var(--fg-0);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .pt-table {
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .pt-table-row {
    display: grid;
    grid-template-columns: minmax(120px, 1fr) 78px 72px;
    gap: 10px;
    padding: 8px 10px;
    align-items: center;
    background: var(--bg-1);
    border-top: 1px solid var(--line-soft);
    color: var(--fg-1);
    font-size: 11.5px;
  }
  .pt-table.two-col .pt-table-row {
    grid-template-columns: minmax(140px, 1fr) 64px;
  }
  .pt-table-row:first-child {
    border-top: 0;
  }
  .pt-table-row span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pt-table-head {
    background: var(--bg-2);
    color: var(--fg-0);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .pt-check-window {
    padding: 12px 14px 16px;
    overflow: auto;
  }
  .pt-check-tabs {
    display: flex;
    justify-content: center;
    border-bottom: 1px solid var(--line);
    margin: 0 -14px 12px;
    padding: 0 14px;
    gap: 0;
  }
  .pt-check-tab {
    appearance: none;
    border: 0;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--fg-1);
    font-size: 12px;
    padding: 8px 14px 6px;
    margin-bottom: -1px;
    cursor: default;
  }
  .pt-check-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .pt-check-layout {
    display: grid;
    grid-template-columns: minmax(520px, 1fr) 320px;
    gap: 18px;
    min-height: 260px;
  }
  .pt-check-main {
    min-width: 0;
  }
  .pt-check-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .pt-check-actions button {
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--fg-1);
    border-radius: 5px;
    height: 24px;
    padding: 0 10px;
    font-size: 11px;
  }
  .pt-check-grid {
    display: grid;
    grid-template-columns: minmax(260px, 1fr) 96px 72px 170px minmax(130px, 1fr);
    border: 1px solid var(--line);
    overflow: auto;
  }
  .pt-check-row {
    display: contents;
  }
  .pt-check-row > span {
    min-height: 22px;
    padding: 3px 6px;
    border-bottom: 1px solid var(--line-soft);
    color: var(--fg-1);
    font-size: 11.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pt-check-head > span {
    position: sticky;
    top: 0;
    z-index: 1;
    background: var(--bg-2);
    color: var(--fg-0);
    font-weight: 650;
    border-bottom-color: var(--line);
  }
  .pt-check-name {
    display: flex;

  .ctxmenu-item .kbd {

<div id="boot">
  <div class="boot-logo"></div>
  <div class="boot-text">OpenPT loading<span class="dots"></span></div>
  <div class="boot-bar"><div class="boot-fill" id="boot-fill"></div></div>

<script>
  // Track real load progress by polling for each script's window-export
  (function () {
    var modules = ['React', 'ReactDOM', 'Babel', 'useTweaks', 'Icon', 'Glyph', 'DeviceCatalog', 'OPT_Engine', 'Palette', 'Topology', 'CLI', 'Inspector', 'PacketTracerImporter'];
    var fill = document.getElementById('boot-fill');
    function tick() {
      var done = 0;
      for (var i = 0; i < modules.length; i++) {
        if (typeof window[modules[i]] !== 'undefined') done++;
      }
      // Reserve last 10% for first React render
      var pct = (done / modules.length) * 90;
      if (fill) fill.style.width = pct.toFixed(1) + '%';
      if (document.getElementById('root') && document.getElementById('root').childNodes.length > 0) {
        // App rendered
        if (fill) fill.style.width = '100%';
        return;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
</script>
